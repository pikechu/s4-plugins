name: build-debug-asi

on:
  workflow_dispatch:
  push:
    paths:
      - "CMakeLists.txt"
      - "cmake/**"
      - "src/**"
      - "tests/**"
      - "third_party/**"
      - "config/CampaignCompletionDebug.ini"
      - "tools/**"
      - ".github/workflows/build-debug-asi.yml"

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Test Settlers United archive integration
        shell: pwsh
        run: ./tools/test_settlers_united_artifact.ps1

      - name: Configure Win32
        run: cmake -S . -B build -A Win32 -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --config Debug --parallel

      - name: Verify fixed-map hook adapter ABI
        shell: pwsh
        run: ./tools/verify_hook_adapter.ps1 -Binary build/Debug/CampaignCompletionDebug.asi

      - name: Reject Hook hot-path file I/O fixture
        shell: pwsh
        run: |
          $fixture = Join-Path $env:RUNNER_TEMP "campaign-hook-policy"
          $source = Join-Path $fixture "src"
          New-Item -ItemType Directory -Path $fixture -Force | Out-Null
          Copy-Item -LiteralPath src -Destination $source -Recurse
          $hook = Join-Path $source "hook/FixedMapLoadHook.cpp"
          $content = [IO.File]::ReadAllText($hook)
          $signature = "void FixedMapLoadHook::Dispatch"
          $signatureIndex = $content.IndexOf($signature)
          if ($signatureIndex -lt 0) { throw "Dispatch signature missing" }
          $braceIndex = $content.IndexOf('{', $signatureIndex)
          if ($braceIndex -lt 0) { throw "Dispatch body missing" }
          $content = $content.Insert($braceIndex + 1, "`n    WriteFile;")
          [IO.File]::WriteAllText($hook, $content)
          $accepted = $true
          try {
            ./tools/verify_hook_adapter.ps1 `
              -Binary build/Debug/CampaignCompletionDebug.asi `
              -SourceRoot $fixture
          } catch {
            $accepted = $false
          }
          if ($accepted) {
            throw "Mutated Hook source was unexpectedly accepted"
          }

      - name: Test
        run: ctest --test-dir build -C Debug --output-on-failure

      - name: Package
        shell: pwsh
        run: ./tools/package_debug.ps1 -BuildDirectory build/Debug -OutputDirectory dist

      - name: Verify PE32 and package contents
        shell: pwsh
        run: |
          $asi = "build/Debug/CampaignCompletionDebug.asi"
          if (-not (Test-Path $asi)) { throw "ASI missing" }
          $bytes = [IO.File]::ReadAllBytes($asi)
          $pe = [BitConverter]::ToInt32($bytes, 0x3c)
          $machine = [BitConverter]::ToUInt16($bytes, $pe + 4)
          if ($machine -ne 0x14c) { throw "Expected IMAGE_FILE_MACHINE_I386" }
          $archive = "dist/CampaignCompletionDebug.zip"
          if (-not (Test-Path $archive)) { throw "Diagnostic archive missing" }
          $inspection = Join-Path $env:RUNNER_TEMP "campaign-completion-package"
          Expand-Archive -Path $archive -DestinationPath $inspection
          $actual = @(Get-ChildItem $inspection -File -Recurse | ForEach-Object {
            $_.FullName.Substring($inspection.Length + 1).Replace('\', '/')
          } | Sort-Object)
          $expected = @(
            "CampaignCompletion/CampaignCompletionDebug.ini"
            "Plugins/CampaignCompletionDebug.asi"
          ) | Sort-Object
          if (Compare-Object $actual $expected) {
            throw "Diagnostic archive contains an unexpected file layout: $($actual -join ', ')"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: CampaignCompletionDebug-Win32
          path: dist/CampaignCompletionDebug.zip
