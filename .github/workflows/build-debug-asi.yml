name: build-debug-asi

on:
  workflow_dispatch:
  push:
    paths:
      - "CampaignMarker/CMakeLists.txt"
      - "CampaignMarker/cmake/**"
      - "CampaignMarker/src/**"
      - "CampaignMarker/tests/**"
      - "third_party/**"
      - "CampaignMarker/config/CampaignCompletionDebug.ini"
      - "CampaignMarker/tools/**"
      - ".github/workflows/build-debug-asi.yml"

concurrency:
  group: build-debug-asi-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Restore incremental build cache
        uses: actions/cache@v4
        with:
          path: CampaignMarker/build
          key: win32-release-build-${{ hashFiles('CampaignMarker/CMakeLists.txt', 'CampaignMarker/cmake/**', 'CampaignMarker/src/**', 'CampaignMarker/tests/**', 'third_party/**') }}
          restore-keys: |
            win32-release-build-

      - name: Test Settlers United archive integration
        shell: pwsh
        run: ./CampaignMarker/tools/test_settlers_united_artifact.ps1

      - name: Configure Win32
        run: cmake -S CampaignMarker -B CampaignMarker/build -A Win32 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build CampaignMarker/build --config Release --parallel

      - name: Verify completion marker rendering policy
        shell: pwsh
        run: |
          ./CampaignMarker/tools/verify_no_process_patch.ps1 `
            -Binary CampaignMarker/build/Release/CampaignCompletionDebug.asi `
            -SourceRoot CampaignMarker

      - name: Reject forbidden behavior fixtures
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          function New-PolicyFixture {
            $root = Join-Path $env:RUNNER_TEMP "campaign-policy-fixture"
            New-Item -ItemType Directory -Path $root -Force | Out-Null
            Copy-Item -LiteralPath CampaignMarker/CMakeLists.txt -Destination $root
            Copy-Item -LiteralPath CampaignMarker/src -Destination (Join-Path $root "src") -Recurse
            return $root
          }
          function Assert-Rejected(
            [string]$root,
            [string]$relativePath,
            [string]$token,
            [string]$message
          ) {
            $fixturePath = Join-Path $root $relativePath
            $originalPath = Join-Path (Join-Path $PWD "CampaignMarker") $relativePath
            $accepted = $true
            try {
              [IO.File]::AppendAllText($fixturePath, "`n// $token mutation fixture`n")
              ./CampaignMarker/tools/verify_no_process_patch.ps1 `
                -SourceRoot $root `
                -SourceOnly
            } catch {
              $accepted = $false
            } finally {
              Copy-Item -LiteralPath $originalPath -Destination $fixturePath -Force
            }
            if ($accepted) { throw $message }
          }

          $fixture = New-PolicyFixture
          Assert-Rejected $fixture "src/runtime/DiagnosticRuntime.cpp" `
            "hlib::CallPatch" `
            "Mutated process-patch source was unexpectedly accepted"

          Assert-Rejected $fixture "src/lua/SuLuaMapBridge.cpp" `
            "lua_setglobal" `
            "Mutated Lua-write source was unexpectedly accepted"

          Assert-Rejected $fixture "src/runtime/S4Listeners.cpp" `
            "GameDefaultGameEndCheck" `
            "GameDefaultGameEndCheck fixture was unexpectedly accepted"

          Assert-Rejected $fixture "src/runtime/S4Listeners.cpp" `
            "VICTORY_CONDITION_CHECK" `
            "Lua victory-handler fixture was unexpectedly accepted"

          $additionalTokens = @(
            "DefaultGameEndCheck"
            "CStateVictoryScreen"
            "lua_settable"
            "WriteProcessMemory"
            "VirtualProtect"
            "hlib::JmpPatch"
            "MinHook"
          )
          foreach ($token in $additionalTokens) {
            Assert-Rejected $fixture "src/runtime/S4Listeners.cpp" $token `
              "$token fixture was unexpectedly accepted"
          }

      - name: Test
        run: ctest --test-dir CampaignMarker/build -C Release --output-on-failure

      - name: Package
        shell: pwsh
        run: ./CampaignMarker/tools/package_debug.ps1 -BuildDirectory CampaignMarker/build/Release -OutputDirectory CampaignMarker/dist

      - name: Verify PE32 and package contents
        shell: pwsh
        run: |
          $asi = "CampaignMarker/build/Release/CampaignCompletionDebug.asi"
          if (-not (Test-Path $asi)) { throw "ASI missing" }
          $bytes = [IO.File]::ReadAllBytes($asi)
          $pe = [BitConverter]::ToInt32($bytes, 0x3c)
          $machine = [BitConverter]::ToUInt16($bytes, $pe + 4)
          if ($machine -ne 0x14c) { throw "Expected IMAGE_FILE_MACHINE_I386" }
          $archive = "CampaignMarker/dist/CampaignCompletionDebug.zip"
          if (-not (Test-Path $archive)) { throw "Diagnostic archive missing" }
          $inspection = Join-Path $env:RUNNER_TEMP "campaign-completion-package"
          Expand-Archive -Path $archive -DestinationPath $inspection
          $actual = @(Get-ChildItem $inspection -File -Recurse | ForEach-Object {
            $_.FullName.Substring($inspection.Length + 1).Replace('\', '/')
          } | Sort-Object)
          $expected = @(
            "Plugins/CampaignCompletion/CampaignCompletionDebug.ini"
            "Plugins/CampaignCompletionDebug.asi"
          ) | Sort-Object
          if (Compare-Object $actual $expected) {
            throw "Diagnostic archive contains an unexpected file layout: $($actual -join ', ')"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: CampaignCompletionDebug-Win32
          path: CampaignMarker/dist/CampaignCompletionDebug.zip
