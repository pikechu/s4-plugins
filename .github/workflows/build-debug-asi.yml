name: build-debug-asi

on:
  workflow_dispatch:
  push:
    paths:
      - "CMakeLists.txt"
      - "cmake/**"
      - "src/**"
      - "tests/**"
      - "third_party/**"
      - "config/CampaignCompletionDebug.ini"
      - "tools/package_debug.ps1"
      - ".github/workflows/build-debug-asi.yml"

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Configure Win32
        run: cmake -S . -B build -A Win32 -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --config Debug --parallel

      - name: Test
        run: ctest --test-dir build -C Debug --output-on-failure

      - name: Package
        if: ${{ hashFiles('tools/package_debug.ps1') != '' }}
        shell: pwsh
        run: ./tools/package_debug.ps1 -BuildDirectory build/Debug -OutputDirectory dist

      - name: Verify PE32 and package contents
        if: ${{ hashFiles('tools/package_debug.ps1') != '' }}
        shell: pwsh
        run: |
          $asi = "build/Debug/CampaignCompletionDebug.asi"
          if (-not (Test-Path $asi)) { throw "ASI missing" }
          $bytes = [IO.File]::ReadAllBytes($asi)
          $pe = [BitConverter]::ToInt32($bytes, 0x3c)
          $machine = [BitConverter]::ToUInt16($bytes, $pe + 4)
          if ($machine -ne 0x14c) { throw "Expected IMAGE_FILE_MACHINE_I386" }
          $archive = "dist/CampaignCompletionDebug.zip"
          if (-not (Test-Path $archive)) { throw "Diagnostic archive missing" }

      - uses: actions/upload-artifact@v4
        if: ${{ hashFiles('tools/package_debug.ps1') != '' }}
        with:
          name: CampaignCompletionDebug-Win32
          path: dist/CampaignCompletionDebug.zip
