name: build-debug-asi

on:
  workflow_dispatch:
  push:
    paths:
      - "CMakeLists.txt"
      - "cmake/**"
      - "src/**"
      - "tests/**"
      - "third_party/**"
      - "config/CampaignCompletionDebug.ini"
      - "tools/**"
      - ".github/workflows/build-debug-asi.yml"

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Test Settlers United archive integration
        shell: pwsh
        run: ./tools/test_settlers_united_artifact.ps1

      - name: Configure Win32
        run: cmake -S . -B build -A Win32 -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --config Debug --parallel

      - name: Verify native event calibration policy
        shell: pwsh
        run: |
          ./tools/verify_no_process_patch.ps1 `
            -Binary build/Debug/CampaignCompletionDebug.asi `
            -SourceRoot .

      - name: Reject forbidden behavior fixtures
        shell: pwsh
        run: |
          function New-PolicyFixture([string]$name) {
            $root = Join-Path $env:RUNNER_TEMP $name
            New-Item -ItemType Directory -Path $root -Force | Out-Null
            Copy-Item -LiteralPath CMakeLists.txt -Destination $root
            Copy-Item -LiteralPath src -Destination (Join-Path $root "src") -Recurse
            return $root
          }
          function Assert-Rejected([string]$root, [string]$message) {
            $accepted = $true
            try {
              ./tools/verify_no_process_patch.ps1 `
                -Binary build/Debug/CampaignCompletionDebug.asi `
                -SourceRoot $root
            } catch {
              $accepted = $false
            }
            if ($accepted) { throw $message }
          }

          $patchFixture = New-PolicyFixture "campaign-process-patch-policy"
          $runtime = Join-Path $patchFixture "src/runtime/DiagnosticRuntime.cpp"
          [IO.File]::AppendAllText($runtime, "`n// hlib::CallPatch mutation fixture`n")
          Assert-Rejected $patchFixture `
            "Mutated process-patch source was unexpectedly accepted"

          $luaFixture = New-PolicyFixture "campaign-lua-write-policy"
          $bridge = Join-Path $luaFixture "src/lua/SuLuaMapBridge.cpp"
          [IO.File]::AppendAllText($bridge, "`n// lua_setglobal mutation fixture`n")
          Assert-Rejected $luaFixture `
            "Mutated Lua-write source was unexpectedly accepted"

          $endCheckFixture = New-PolicyFixture "campaign-end-check-policy"
          $listener = Join-Path $endCheckFixture "src/runtime/S4Listeners.cpp"
          [IO.File]::AppendAllText($listener,
            "`n// GameDefaultGameEndCheck forbidden behavior fixture`n")
          Assert-Rejected $endCheckFixture `
            "GameDefaultGameEndCheck fixture was unexpectedly accepted"

          $luaHandlerFixture = New-PolicyFixture "campaign-lua-handler-policy"
          $listener = Join-Path $luaHandlerFixture "src/runtime/S4Listeners.cpp"
          [IO.File]::AppendAllText($listener,
            "`n// VICTORY_CONDITION_CHECK mutation fixture`n")
          Assert-Rejected $luaHandlerFixture `
            "Lua victory-handler fixture was unexpectedly accepted"

          $additionalTokens = @(
            "DefaultGameEndCheck"
            "CStateVictoryScreen"
            "lua_settable"
            "WriteProcessMemory"
            "VirtualProtect"
            "hlib::JmpPatch"
            "MinHook"
          )
          for ($index = 0; $index -lt $additionalTokens.Count; ++$index) {
            $token = $additionalTokens[$index]
            $fixture = New-PolicyFixture "campaign-forbidden-policy-$index"
            $listener = Join-Path $fixture "src/runtime/S4Listeners.cpp"
            [IO.File]::AppendAllText($listener,
              "`n// $token forbidden behavior fixture`n")
            Assert-Rejected $fixture `
              "$token fixture was unexpectedly accepted"
          }

      - name: Test
        run: ctest --test-dir build -C Debug --output-on-failure

      - name: Package
        shell: pwsh
        run: ./tools/package_debug.ps1 -BuildDirectory build/Debug -OutputDirectory dist

      - name: Verify PE32 and package contents
        shell: pwsh
        run: |
          $asi = "build/Debug/CampaignCompletionDebug.asi"
          if (-not (Test-Path $asi)) { throw "ASI missing" }
          $bytes = [IO.File]::ReadAllBytes($asi)
          $pe = [BitConverter]::ToInt32($bytes, 0x3c)
          $machine = [BitConverter]::ToUInt16($bytes, $pe + 4)
          if ($machine -ne 0x14c) { throw "Expected IMAGE_FILE_MACHINE_I386" }
          $archive = "dist/CampaignCompletionDebug.zip"
          if (-not (Test-Path $archive)) { throw "Diagnostic archive missing" }
          $inspection = Join-Path $env:RUNNER_TEMP "campaign-completion-package"
          Expand-Archive -Path $archive -DestinationPath $inspection
          $actual = @(Get-ChildItem $inspection -File -Recurse | ForEach-Object {
            $_.FullName.Substring($inspection.Length + 1).Replace('\', '/')
          } | Sort-Object)
          $expected = @(
            "Plugins/CampaignCompletion/CampaignCompletionDebug.ini"
            "Plugins/CampaignCompletionDebug.asi"
          ) | Sort-Object
          if (Compare-Object $actual $expected) {
            throw "Diagnostic archive contains an unexpected file layout: $($actual -join ', ')"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: CampaignCompletionDebug-Win32
          path: dist/CampaignCompletionDebug.zip
